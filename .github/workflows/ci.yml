# Phase 6 Slice 1 — CI pipeline
# Gates every PR and every push to main on a clean build + full test suite.
# See docs/phase6-production-readiness-spec.md (Slice 1) for the why.
#
# Why H2 and not Testcontainers/Postgres services in CI:
#   The H2 `test` profile (src/test/resources/application-test.yml) uses ddl-auto=create-drop,
#   so Hibernate builds the schema from the entities → no Flyway jsonb/text mismatch.
#   The 308-test suite is green on H2 locally; that is exactly what we gate on here.
#   Testcontainers/real-Postgres is deferred to Slice 4 (see the "Known blocker" section of the spec),
#   because BaseIntegrationTest + ddl-auto=validate trips on audit_logs jsonb/text today.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK matches pom.xml <java.version>21</java.version>.
      # temurin = Eclipse Temurin (Adoptium) OpenJDK distribution; widely used and stable for CI.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          # Cache the local Maven repository (~/.m2) keyed on pom.xml.
          # A cache hit skips re-downloading dependencies → faster CI, fewer flaky network failures.
          # If pom.xml changes, the key changes and a fresh cache is rebuilt.
          cache: maven

      # `verify` = compile + unit tests + integration tests + (re)package.
      # -B = batch mode (no interactive prompts, clean log output).
      # No env-unset needed: GitHub runners don't set SPRING_DATASOURCE_*, and the suite
      # uses @ActiveProfiles("test") = H2 in-memory, so there is nothing to override.
      # Any failing test fails this step → the job and the PR check go red (blocks merge).
      - name: Build and test
        run: ./mvnw -B verify
