          minLength: 5
        description:
          type: string
          maxLength: 2000
          minLength: 0
        pricingType:
          type: string
          enum:
          - FIXED
          - HOURLY
          - VARIABLE
        basePrice:
          type: number
          minimum: 0.0
        durationHours:
          type: integer
          format: int32
        address:
          type: string
          maxLength: 500
          minLength: 0
        city:
          type: string
          maxLength: 50
          minLength: 0
        imageUrl:
          type: string
        active:
          type: boolean
    ServiceResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        providerId:
          type: integer
          format: int64
        providerName:
          type: string
        categoryId:
          type: integer
          format: int64
        categoryName:
          type: string
        title:
          type: string
        description:
          type: string
        pricingType:
          type: string
          enum:
          - FIXED
          - HOURLY
          - VARIABLE
        basePrice:
          type: number
        durationHours:
          type: integer
          format: int32
        address:
          type: string
        city:
          type: string
        imageUrl:
          type: string
        status:
          type: string
          enum:
          - DRAFT
          - ACTIVE
          - INACTIVE
        averageRating:
          type: number
        totalReviews:
          type: integer
          format: int32
        totalBookings:
          type: integer
          format: int32
        createdAt:
          type: string
          format: date-time
    BookingResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        customerId:
          type: integer
          format: int64
        customerName:
          type: string
        serviceId:
          type: integer
          format: int64
        serviceTitle:
          type: string
        providerId:
          type: integer
          format: int64
        providerName:
          type: string
        serviceStreet:
          type: string
        serviceCity:
          type: string
        serviceZipCode:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          type: string
          enum:
          - PENDING
          - CONFIRMED
          - PAID
          - IN_PROGRESS
          - COMPLETED
          - CANCELLED
        quantity:
          type: integer
          format: int32
        totalPrice:
          type: number
        commission:
          type: number
        total:
          type: number
        currency:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ServiceCreateRequest:
      type: object
      properties:
        categoryId:
          type: integer
          format: int64
        title:
          type: string
          maxLength: 200
          minLength: 5
        description:
          type: string
          maxLength: 2000
          minLength: 0
        pricingType:
          type: string
          enum:
          - FIXED
          - HOURLY
          - VARIABLE
        basePrice:
          type: number
          minimum: 0.0
        durationHours:
          type: integer
          format: int32
        address:
          type: string
          maxLength: 500
          minLength: 0
        city:
          type: string
          maxLength: 50
          minLength: 0
        imageUrl:
          type: string
      required:
      - basePrice
      - categoryId
      - pricingType
      - title
    ReviewCreateRequest:
      type: object
      properties:
        bookingId:
          type: integer
          format: int64
        rating:
          type: integer
          format: int32
          maximum: 5
          minimum: 1
        comment:
          type: string
          maxLength: 2000
          minLength: 0
      required:
      - bookingId
      - rating
    ReviewResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        bookingId:
          type: integer
          format: int64
        serviceId:
          type: integer
          format: int64
        serviceTitle:
          type: string
        customerId:
          type: integer
          format: int64
        customerName:
          type: string
        providerId:
          type: integer
          format: int64
        providerName:
          type: string
        rating:
          type: integer
          format: int32
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
    RefundRequest:
      type: object
      properties:
        amountCents:
          type: integer
          format: int64
        reason:
          type: string
    RefundResponse:
      type: object
      properties:
        refundId:
          type: integer
          format: int64
        paymentId:
          type: integer
          format: int64
        stripeRefundId:
          type: string
        status:
          type: string
          enum:
          - PENDING
          - PROCESSING
          - SUCCEEDED
          - FAILED
        amount:
          type: number
        reason:
          type: string
        createdAt:
          type: string
          format: date-time
    PaymentCreateRequest:
      type: object
      properties:
        bookingId:
          type: integer
          format: int64
        paymentMethod:
          type: string
          minLength: 1
      required:
      - bookingId
      - paymentMethod
    PaymentResponse:
      type: object
      properties:
        paymentId:
          type: integer
          format: int64
        stripePaymentIntentId:
          type: string
        clientSecret:
          type: string
        status:
          type: string
          enum:
          - PENDING
          - PROCESSING
          - SUCCEEDED
          - FAILED
        bookingId:
          type: integer
          format: int64
        amount:
          type: number
        currency:
          type: string
        paymentMethod:
          type: string
        createdAt:
          type: string
          format: date-time
    BookingCreateRequest:
      type: object
      properties:
        serviceId:
          type: integer
          format: int64
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        quantity:
          type: integer
          format: int32
        street:
          type: string
          minLength: 1
        city:
          type: string
          minLength: 1
        zipCode:
          type: string
        notes:
          type: string
          maxLength: 1000
          minLength: 0
      required:
      - city
      - endTime
      - serviceId
      - startTime
      - street
    RegisterRequest:
      type: object
      properties:
        fullName:
          type: string
          maxLength: 100
          minLength: 2
        email:
          type: string
          minLength: 1
        password:
          type: string
          maxLength: 100
          minLength: 8
          pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d).+$"
        phoneNumber:
          type: string
          minLength: 1
          pattern: "^\\+?[1-9]\\d{1,14}$"
        registerAsProvider:
          type: boolean
      required:
      - email
      - fullName
      - password
      - phoneNumber
    AuthResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshTokenExpiresAt:
          type: string
          format: date-time
    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
      required:
      - refreshToken
    TokenRefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
      - email
      - password
    ProviderAdminResponse:
      type: object
      properties:
        providerId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        businessName:
          type: string
        email:
          type: string
        verificationStatus:
          type: string
          enum:
          - PENDING
          - APPROVED
          - REJECTED
        createdAt:
          type: string
          format: date-time
    Pageable:
      type: object
      properties:
        page:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 1
        sort:
          type: array
          items:
            type: string
    PageServiceResponse:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        first:
          type: boolean
        last:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: "#/components/schemas/PageableObject"
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/ServiceResponse"
        number:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        paged:
          type: boolean
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        unpaged:
          type: boolean
        offset:
          type: integer
          format: int64
        sort:
          $ref: "#/components/schemas/SortObject"
    SortObject:
      type: object
      properties:
        sorted:
