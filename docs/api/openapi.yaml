          type: integer
          format: int32
        totalBookings:
          type: integer
          format: int32
        pendingBookings:
          type: integer
          format: int32
        confirmedBookings:
          type: integer
          format: int32
        completedBookings:
          type: integer
          format: int32
        cancelledBookings:
          type: integer
          format: int32
        averageRating:
          type: number
        totalReviews:
          type: integer
          format: int32
        bookingsByStatus:
          type: object
          additionalProperties:
            type: integer
            format: int32
        totalCustomers:
          type: integer
          format: int32
    ProviderEarningsResponse:
      type: object
      properties:
        totalEarnings:
          type: number
        pendingPayouts:
          type: number
        paidOut:
          type: number
        currency:
          type: string
        earningsByMonth:
          type: object
          additionalProperties:
            type: number
    CategoryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        slug:
          type: string
        description:
          type: string
    PageBookingResponse:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        first:
          type: boolean
        last:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: "#/components/schemas/PageableObject"
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/BookingResponse"
        number:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        empty:
          type: boolean
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        fullName:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        role:
          type: string
          enum:
          - CUSTOMER
          - VENDOR
          - ADMIN
        status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - SUSPENDED
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PageProviderAdminResponse:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        first:
          type: boolean
        last:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: "#/components/schemas/PageableObject"
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/ProviderAdminResponse"
        number:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        empty:
          type: boolean
  securitySchemes:
    bearerAuth:
      type: http
      description: Enter JWT token (without 'Bearer ' prefix)
      scheme: bearer
      bearerFormat: JWT
