openapi: 3.1.0
info:
  title: Service Marketplace API
  description: |
    REST API for Service Marketplace - a platform connecting service providers with customers.

    ## Authentication
    - Use `/api/auth/register` to create an account
    - Use `/api/auth/login` to get JWT tokens
    - Include `Authorization: Bearer <token>` header for authenticated endpoints

    ## Roles
    - **CUSTOMER**: Browse services, create bookings, leave reviews
    - **VENDOR**: Manage services, view bookings, track earnings
    - **ADMIN**: Full system access
  contact:
    name: Hien Nguyen
    email: fangrixian.nguyenn@outlook.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: 0.0.1
servers:
- url: http://localhost
  description: Generated server url
security:
- bearerAuth: []
tags:
- name: Provider Dashboard
  description: Provider analytics and statistics
- name: Bookings
  description: Booking management endpoints
- name: Provider Service Management
  description: Endpoints for providers to manage their services
- name: Webhooks
  description: Third-party webhook endpoints
- name: Categories
  description: Service categories (public reference data)
- name: Service Catalog
  description: Public service browsing endpoints
- name: Payments
  description: Payment creation and management
- name: Refunds
  description: Refund creation and management
- name: Authentication
  description: "User registration, login, and token refresh"
- name: Admin
  description: "Admin operations: provider approval / rejection"
- name: Reviews
  description: Review management endpoints
paths:
  /api/provider/services/{id}:
    put:
      tags:
      - Provider Service Management
      summary: Update service
      description: Update an existing service owned by the authenticated provider
      operationId: updateService
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdateRequest"
        required: true
      responses:
        "200":
          description: Service updated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceResponse"
        "404":
          description: Service not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceResponse"
        "422":
          description: Not your service
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceResponse"
      security:
      - bearerAuth: []
    delete:
      tags:
      - Provider Service Management
      summary: Deactivate service
      description: Deactivate (soft delete) a service owned by the authenticated provider
      operationId: deactivateService
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Service deactivated
        "404":
          description: Service not found
        "422":
          description: Not your service
      security:
      - bearerAuth: []
  /api/bookings/{id}/start:
    put:
      tags:
      - Bookings
      summary: Start service
      description: Provider marks a CONFIRMED booking as IN_PROGRESS when the service
        begins. Only the provider who owns the service may start it.
      operationId: startService
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Service started
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "404":
          description: Booking not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "422":
          description: "Not your service, or status doesn't allow start"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
      security:
      - bearerAuth: []
  /api/bookings/{id}/confirm:
    put:
      tags:
      - Bookings
      summary: Confirm booking
      description: "Provider confirms a pending booking, transitioning it to CONFIRMED.\
        \ Only the provider who owns the service may confirm. Required for the book\
        \ → pay flow: payment can only be created for a CONFIRMED booking."
      operationId: confirmBooking
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Booking confirmed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "404":
          description: Booking not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "422":
          description: "Not your service, or status doesn't allow confirm"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
      security:
      - bearerAuth: []
  /api/bookings/{id}/complete:
    put:
      tags:
      - Bookings
      summary: Complete service
      description: Provider marks an IN_PROGRESS booking as COMPLETED once the service
        is done. Only the provider who owns the service may complete it. A booking must
        be COMPLETED before the customer can review it.
      operationId: completeService
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Service completed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "404":
          description: Booking not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "422":
          description: "Not your service, or status doesn't allow complete"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
      security:
      - bearerAuth: []
  /api/bookings/{id}/cancel:
    put:
      tags:
      - Bookings
      summary: Cancel booking
      description: Cancel a pending booking
      operationId: cancelBooking
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Booking cancelled
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "404":
          description: Booking not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "422":
          description: Cannot cancel (not yours or invalid status)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
      security:
      - bearerAuth: []
  /api/webhooks/stripe:
    post:
      tags:
      - Webhooks
      summary: Stripe webhook
      description: Handle Stripe payment events. This endpoint is PUBLIC (no JWT).
        Security comes from Stripe signature verification.
      operationId: handleStripeWebhook
      parameters:
      - name: Stripe-Signature
        in: header
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        "200":
          description: OK
  /api/provider/services:
    get:
      tags:
      - Provider Service Management
      summary: Get provider's services
      description: List all services owned by the authenticated provider
      operationId: getMyServices
      parameters:
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Services retrieved
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageServiceResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageServiceResponse"
        "403":
          description: Not a provider
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageServiceResponse"
      security:
      - bearerAuth: []
    post:
      tags:
      - Provider Service Management
      summary: Create service
      description: Create a new service for the authenticated provider
      operationId: createService
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceCreateRequest"
        required: true
      responses:
        "201":
          description: Service created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceResponse"
        "400":
          description: Invalid input
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceResponse"
        "403":
          description: Not a provider
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceResponse"
        "422":
          description: Provider not approved
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceResponse"
      security:
      - bearerAuth: []
  /api/provider/services/{id}/activate:
    post:
      tags:
      - Provider Service Management
      summary: Activate service
      description: Activate (publish) a service owned by the authenticated provider
        so it appears in the public catalog
      operationId: activateService
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Service activated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceResponse"
        "404":
          description: Service not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceResponse"
        "422":
          description: Not your service
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceResponse"
      security:
      - bearerAuth: []
  /api/reviews:
    post:
      tags:
      - Reviews
      summary: Create review
      description: Leave a review for a booking the caller owns. The booking must
        be COMPLETED and not already reviewed.
      operationId: createReview
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewCreateRequest"
        required: true
      responses:
        "201":
          description: Review created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReviewResponse"
        "400":
          description: Invalid input
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReviewResponse"
        "404":
          description: Booking not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReviewResponse"
        "422":
          description: "Not your booking, not completed, or already reviewed"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReviewResponse"
      security:
      - bearerAuth: []
  /api/refunds:
    post:
      tags:
      - Refunds
      summary: Create refund
      description: Create a refund for a payment. Omit amountCents for full refund.
      operationId: createRefund
      parameters:
      - name: paymentId
        in: query
        description: Payment ID
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefundRequest"
      responses:
        "201":
          description: Refund created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RefundResponse"
        "404":
          description: Payment not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RefundResponse"
        "422":
          description: Payment not refundable or invalid amount
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RefundResponse"
      security:
      - bearerAuth: []
  /api/payments:
    post:
      tags:
      - Payments
      summary: Create payment
      description: Create a payment for a booking. Returns clientSecret for Stripe.js.
      operationId: createPayment
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCreateRequest"
        required: true
      responses:
        "201":
          description: "Payment created, clientSecret returned"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "404":
          description: Booking not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "409":
          description: Payment already exists for this booking
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "422":
          description: Booking not eligible for payment
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaymentResponse"
      security:
      - bearerAuth: []
  /api/bookings:
    get:
      tags:
      - Bookings
      summary: Get my bookings
      description: List all bookings for the authenticated customer
      operationId: getMyBookings
      parameters:
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Bookings retrieved
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageBookingResponse"
      security:
      - bearerAuth: []
    post:
      tags:
      - Bookings
      summary: Create booking
      description: Create a new booking for a service
      operationId: createBooking
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingCreateRequest"
        required: true
      responses:
        "201":
          description: Booking created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "400":
          description: Invalid input
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "404":
          description: Service not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
        "422":
          description: Service not available
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/BookingResponse"
      security:
      - bearerAuth: []
  /api/auth/register:
    post:
      tags:
      - Authentication
      summary: Register new user
      description: Create a new user account. Optionally register as provider.
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "201":
          description: User registered successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already registered
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input data
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/auth/refresh:
    post:
      tags:
      - Authentication
      summary: Refresh access token
      description: Get a new access token using a valid refresh token
      operationId: refreshToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
        required: true
      responses:
        "200":
          description: Token refreshed successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TokenRefreshResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TokenRefreshResponse"
  /api/auth/login:
    post:
      tags:
      - Authentication
      summary: Login
      description: Authenticate with email and password to get JWT tokens
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: Login successful
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input data
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/admin/providers/{providerId}/reject:
    post:
      tags:
      - Admin
      summary: Reject a provider
      operationId: rejectProvider
      parameters:
      - name: providerId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Provider rejected
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderAdminResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderAdminResponse"
        "403":
          description: Not an admin
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderAdminResponse"
        "404":
          description: Provider not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderAdminResponse"
      security:
      - bearerAuth: []
  /api/admin/providers/{providerId}/approve:
    post:
      tags:
      - Admin
      summary: Approve a provider
      operationId: approveProvider
      parameters:
      - name: providerId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Provider approved
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderAdminResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderAdminResponse"
        "403":
          description: Not an admin
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderAdminResponse"
        "404":
          description: Provider not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderAdminResponse"
      security:
      - bearerAuth: []
  /api/provider/dashboard/stats:
    get:
      tags:
      - Provider Dashboard
      summary: Get statistics
      description: Get booking statistics for authenticated provider
      operationId: getStats
      responses:
        "200":
          description: Statistics retrieved
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderStatsResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderStatsResponse"
        "403":
          description: Not a provider
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderStatsResponse"
        "422":
          description: Provider profile not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderStatsResponse"
      security:
      - bearerAuth: []
  /api/provider/dashboard/earnings:
    get:
      tags:
      - Provider Dashboard
      summary: Get earnings
      description: Get earnings summary for authenticated provider
      operationId: getEarnings
      responses:
        "200":
          description: Earnings retrieved
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderEarningsResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderEarningsResponse"
        "403":
          description: Not a provider
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderEarningsResponse"
        "422":
          description: Provider profile not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderEarningsResponse"
      security:
      - bearerAuth: []
  /api/services:
    get:
      tags:
      - Service Catalog
      summary: List all services
      description: Get paginated list of all active services
      operationId: getAllServices
      parameters:
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Services retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageServiceResponse"
  /api/services/{id}:
    get:
      tags:
      - Service Catalog
      summary: Get service detail
      description: Get detailed information about a specific service
      operationId: getServiceById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Service found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceResponse"
        "404":
          description: Service not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceResponse"
  /api/services/category/{categoryId}:
    get:
      tags:
      - Service Catalog
      summary: Get services by category
      description: Filter services by category ID
      operationId: getServicesByCategory
      parameters:
      - name: categoryId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Services retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageServiceResponse"
  /api/reviews/provider/{providerId}:
    get:
      tags:
      - Reviews
      summary: Get provider reviews
      description: "List all reviews for a provider, newest first."
      operationId: getProviderReviews
      parameters:
      - name: providerId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Reviews retrieved
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReviewResponse"
  /api/reviews/service/{serviceId}:
    get:
      tags:
      - Reviews
      summary: Get service reviews
      description: "List all reviews for a service, newest first."
      operationId: getServiceReviews
      parameters:
      - name: serviceId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Reviews retrieved
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReviewResponse"
  /api/refunds/{id}:
    get:
      tags:
      - Refunds
      summary: Get refund by ID
      description: Retrieve refund details.
      operationId: getRefund
      parameters:
      - name: id
        in: path
        description: Refund ID
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Refund found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RefundResponse"
        "404":
          description: Refund not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RefundResponse"
      security:
      - bearerAuth: []
  /api/refunds/payment/{paymentId}:
    get:
      tags:
      - Refunds
      summary: Get refunds for payment
      description: Retrieve all refunds for a specific payment.
      operationId: getRefundsForPayment
      parameters:
      - name: paymentId
        in: path
        description: Payment ID
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Refunds found
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RefundResponse"
        "404":
          description: Payment not found
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RefundResponse"
      security:
      - bearerAuth: []
  /api/payments/{id}:
    get:
      tags:
      - Payments
      summary: Get payment by ID
      description: Retrieve payment details. Only booking owner can access.
      operationId: getPayment
      parameters:
      - name: id
        in: path
        description: Payment ID
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Payment found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "404":
          description: Payment not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "403":
          description: Not authorized to view this payment
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaymentResponse"
      security:
      - bearerAuth: []
  /api/payments/booking/{bookingId}:
    get:
      tags:
      - Payments
      summary: Get payment by booking ID
      description: Retrieve payment for a specific booking. Only booking owner can access.
      operationId: getPaymentByBooking
      parameters:
      - name: bookingId
        in: path
        description: Booking ID
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Payment found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "404":
          description: No payment for this booking
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "403":
          description: Not authorized to view this payment
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaymentResponse"
      security:
      - bearerAuth: []
  /api/health:
    get:
      tags:
      - health-controller
      operationId: health
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: string
  /api/categories:
    get:
      tags:
      - Categories
      summary: List categories
      description: Return all service categories. Public — used by the catalog filter
        and the provider create-service form.
      operationId: listCategories
      responses:
        "200":
          description: Categories returned
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryResponse"
  /api/bookings/provider:
    get:
      tags:
      - Bookings
      summary: Get provider bookings
      description: List all bookings for the authenticated provider's services
      operationId: getProviderBookings
      parameters:
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Bookings retrieved
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageBookingResponse"
      security:
      - bearerAuth: []
  /api/auth/me:
    get:
      tags:
      - Authentication
      summary: Get current user
      description: Return the authenticated user's profile from the JWT.
      operationId: getCurrentUser
      responses:
        "200":
          description: Current user profile
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
      security:
      - bearerAuth: []
  /api/admin/providers:
    get:
      tags:
      - Admin
      summary: List providers (optionally filtered by verification status)
      operationId: listProviders
      parameters:
      - name: status
        in: query
        description: Filter by verification status; omit to list all
        required: false
        schema:
          type: string
          enum:
          - PENDING
          - APPROVED
          - REJECTED
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Page of providers
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageProviderAdminResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageProviderAdminResponse"
        "403":
          description: Not an admin
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageProviderAdminResponse"
      security:
      - bearerAuth: []
components:
  schemas:
    ServiceUpdateRequest:
