# Prod profile — hardened for production deployment (Phase 6 Slice 3 + Slice 5 deploy config).
# Activated by: SPRING_PROFILES_ACTIVE=prod.
#
# Design rules (see docs/phase6-production-readiness-spec.md Slice 3 + Slice 5):
# - ALL secrets come from environment variables, with NO default value. A missing secret
#   makes Spring fail-fast at startup with a clear "could not resolve placeholder" error —
#   this is intentional (better than silently falling back to a weak/dev value in prod).
# - DB/Redis connection details are NOT repeated here: the common application.yml already
#   reads them from SPRING_DATASOURCE_* / SPRING_DATA_REDIS_* env vars via Spring Boot's
#   relaxed binding. Setting them again would just duplicate config.
# - SQL logging is silenced; app logs are INFO; Hibernate SQL goes to WARN.

# Server port: ${PORT:8080}.
# WHY a placeholder, not a literal: PaaS providers (Render, Fly.io, Heroku, ...) inject a `PORT`
# env var on a random internal port and route external HTTPS (443) traffic to it. Binding to a
# fixed port (e.g. 8080) there means the platform's health-check / router can't reach the app.
# The default `:8080` keeps dev/compose/local working unchanged when PORT is unset.
# (This overrides the literal `server.port: 8080` in the common application.yml for prod only.)
server:
  port: ${PORT:8080}

spring:
  # Keep Flyway on (real schema migrations on startup) and validate entities against it.
  # (audit_logs jsonb→text mismatch was fixed in V10, so validate passes on real Postgres.)
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

  # Redis TLS — ${REDIS_SSL:false}.
  # WHY a flag instead of hardcoding true: Upstash (and many managed Redis providers) REQUIRE TLS,
  # so the client must connect with a TLS-wrapped socket. Local/compose Redis is plaintext, so TLS
  # would break it. Defaulting to false keeps dev/compose/local working; render.yaml sets REDIS_SSL=true.
  # host/port/password are NOT repeated here — they keep flowing from SPRING_DATA_REDIS_* env vars
  # via Spring Boot relaxed binding (see common application.yml + docker-compose.yml pattern).
  data:
    redis:
      ssl:
        enabled: ${REDIS_SSL:false}

# JWT signing secret. ${JWT_SECRET} with NO default → fail-fast if unset.
# HS256 requires ≥256-bit (≥32-char) keys; the placeholder in .env.example documents the minimum.
app:
  jwt:
    secret: ${JWT_SECRET}

  # CORS allow-list for the Phase 7 frontend (Vercel + any preview deploys).
  # ${APP_CORS_ALLOWED_ORIGINS} with NO default → fail-fast if unset. An empty value in prod would
  # silently break the browser app (every request blocked), so we require the operator to set it
  # explicitly. Example on Render: https://service-marketplace.vercel.app,https://*.vercel.app
  # Wildcards work because SecurityConfig uses setAllowedOriginPatterns (not setAllowedOrigins).
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}

# Stripe keys — required by StripeConfig (@NotBlank), so they MUST be set in any profile.
# Repeated here only to make the prod contract explicit: no literal, env-only.
stripe:
  api-key: ${STRIPE_API_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}

# Prod logging: INFO overall, JSON/ECS on the console so a log aggregator (ELK/Loki/Datadog)
# can parse structured fields. Spring Boot 3.4+ ships this encoder built-in — no extra lib.
# WHY ECS: Elastic Common Schema — standardized field names (@timestamp, log.level, service.name, ...).
# Dev/test profiles keep human-readable plain text; this override only applies under `prod`.
logging:
  level:
    root: INFO
    com.hien.marketplace: INFO
    org.hibernate.SQL: WARN
  structured:
    format:
      console: ecs
