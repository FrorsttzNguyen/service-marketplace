# Common configuration — shared across all profiles
# Profile-specific config overrides these values

spring:
  application:
    name: service-marketplace

  # JPA / Hibernate settings
  jpa:
    # "validate" means Spring checks that entities match the DB schema
    # but NEVER auto-creates or alters tables. Flyway manages all schema changes.
    hibernate:
      ddl-auto: validate
    # Show SQL in logs during development (disable in production)
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Flyway — database migration tool
  # Manages versioned SQL scripts in src/main/resources/db/migration/
  flyway:
    enabled: true
    # baseline-on-migrate allows Flyway to start on an existing database
    baseline-on-migrate: true

  # Caching (Phase 5)
  # - Default runtime cache type is Redis. The "test" profile sets spring.cache.type=simple so
  #   tests use an in-memory ConcurrentMapCacheManager instead.
  # - TTLs per cache name are configured in CacheConfig#cacheManager, not here, because they are
  #   code-level decisions tied to the cache names referenced by annotations.
  cache:
    type: redis

# Server
server:
  port: 8080

# Rate limiting (Phase 5)
# - ON by default; the test profile sets app.ratelimit.enabled=false so existing auth/booking
#   integration tests (shared context, repeated /api/auth/** calls) are not blocked.
# - Limits are defined in code (RateLimitFilter): login 5/min, register 3/hour, refresh 10/min.
app:
  ratelimit:
    enabled: true

# Actuator — production-ready monitoring endpoints
management:
  endpoints:
    web:
      exposure:
        # Only expose health and info (not all actuator endpoints)
        include: health, info
  endpoint:
    health:
      # Show component details (db, redis status) only to authenticated users
      show-details: when-authorized
