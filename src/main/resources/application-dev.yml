# Dev profile — connects to local Docker services
# Activated by: spring.profiles.active=dev (or SPRING_PROFILES_ACTIVE env var)

spring:
  # PostgreSQL — matches docker-compose.yml
  datasource:
    url: jdbc:postgresql://localhost:5433/marketplace
    username: marketplace
    password: marketplace
    driver-class-name: org.postgresql.Driver
    hikari:
      # Connection pool settings — small for local dev
      maximum-pool-size: 5
      minimum-idle: 2

  # Redis — matches docker-compose.yml
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # Show SQL in dev for learning
  jpa:
    show-sql: true

# Logging
logging:
  level:
    com.hien.marketplace: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# JWT Configuration
app:
  jwt:
    # Secret key for signing JWT tokens - MUST be 256+ bits (32+ chars) for HS256
    # In production, use environment variable: JWT_SECRET
    secret: dev-secret-key-change-in-production-must-be-at-least-256-bits
    # Access token expiration: 15 minutes (short-lived for security)
    access-expiration-minutes: 15
    # Refresh token expiration: 7 days (long-lived for user convenience)
    refresh-expiration-days: 7

# Stripe Configuration (Phase 4)
# API keys from Stripe Dashboard: https://dashboard.stripe.com/test/apikeys
# Webhook secret from Stripe CLI: stripe listen --print-secret
stripe:
  api-key: ${STRIPE_API_KEY:sk_test_your_stripe_test_key_here}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret_here}
