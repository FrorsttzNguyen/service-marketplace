# Test profile — uses H2 in-memory database for fast tests
# No Docker needed for running tests

spring:
  # H2 in-memory database — auto-created, destroyed after tests
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # H2 console available at /h2-console during tests (debugging)
  h2:
    console:
      enabled: true

  # In tests, let Hibernate create tables from entities
  # (no Flyway migrations needed for unit/integration tests)
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  # Disable Flyway in test profile
  flyway:
    enabled: false

  # Redis / cache in tests (Phase 5):
  # - We deliberately do NOT set spring.data.redis.host here. The RateLimitConfig and
  #   rateLimitProxyManager bean are @ConditionalOnProperty(spring.data.redis.host), so omitting it
  #   keeps them out of the test context → tests run with zero Redis dependency.
  #   The RateLimitFilter then uses its in-memory ConcurrentHashMap fallback.
  # - spring.cache.type=simple switches @Cacheable to an in-JVM ConcurrentMapCacheManager, so cache
  #   behavior is testable without a Redis server.
  cache:
    type: simple

logging:
  level:
    com.hien.marketplace: DEBUG

# JWT Configuration for tests
app:
  jwt:
    secret: test-secret-key-for-jwt-signing-must-be-at-least-256-bits-long
    access-expiration-minutes: 15
    refresh-expiration-days: 7

  # Commission rate pinned in tests so assertions on order totals are deterministic and don't
  # break if the production default changes. 0.10 = 10%.
  commission:
    rate: 0.10
  # Rate limiting is disabled in the test profile so existing auth/booking integration tests
  # (which reuse one shared ApplicationContext and legitimately repeat /api/auth/** calls) are not
  # blocked by 429s. Dedicated rate-limit behavior is verified by RateLimitFilterTest (Task 6)
  # against an isolated filter instance.
  ratelimit:
    enabled: false

# Stripe Configuration for tests (Phase 4)
# Use test mode keys for integration tests
stripe:
  api-key: sk_test_test_key_for_unit_tests
  webhook-secret: whsec_test_webhook_secret_for_unit_tests
